name: Code Examples
version: 2
description: Annotated real code examples showing canonical patterns in use

examples:

  - category: Cog Pattern
    description: Standard cog structure with hybrid command and permission decorator
    code: |
      from __future__ import annotations

      import logging
      from typing import TYPE_CHECKING

      import discord
      from discord.ext import commands

      from bot.core.base_cog import BaseCog
      from bot.core.decorators import requires_command_permission
      from bot.core.context import Context

      if TYPE_CHECKING:
          from bot.core.bot import Bot

      logger = logging.getLogger(__name__)

      class ExampleCog(BaseCog):
          """Cog for example commands."""

          def __init__(self, bot: Bot) -> None:
              super().__init__(bot)

          @commands.hybrid_command(name="hello", description="Say hello")
          @requires_command_permission()
          async def hello(self, ctx: Context) -> None:
              """Say hello to the user.

              Parameters
              ----------
              ctx : Context
                  The command invocation context.
              """
              await ctx.send(f"Hello {ctx.author.mention}!")
    notes:
      - Class name always PascalCase + Cog suffix
      - BaseCog provides self.db, self.cache, self.bot properties
      - "@requires_command_permission() is applied after @commands.hybrid_command"
      - Type hints with __future__ annotations for PEP 604 syntax

  - category: Permission Decorator
    description: Permission decorator with self-use allowance
    code: |
      @commands.hybrid_command(name="warn", description="Warn a member")
      @requires_command_permission(allow_self_use_for_param="member")
      async def warn(self, ctx: Context, member: discord.Member, *, reason: str) -> None:
          """Warn a guild member.

          Parameters
          ----------
          ctx : Context
              The command invocation context.
          member : discord.Member
              The member to warn.
          reason : str
              The reason for the warning.
          """
          ...
    notes:
      - allow_self_use_for_param="member" lets users warn themselves (e.g., self-mute)
      - Permission level checked against DB-driven PermissionRank system
      - Raises BotPermissionDeniedError on failure

  - category: Error Handling
    description: Command-level error handling with logging and user feedback
    code: |
      @commands.hybrid_command(name="case", description="View a moderation case")
      @requires_command_permission()
      async def case(self, ctx: Context, case_id: int) -> None:
          """View details of a moderation case.

          Parameters
          ----------
          ctx : Context
              The command invocation context.
          case_id : int
              The case ID number.
          """
          try:
              case = await self.db.cases.get_by_id(ctx.guild.id, case_id)
              if not case:
                  await ctx.send("Case not found.")
                  return
              await ctx.send(embed=case_to_embed(case))
          except BotDatabaseError as exc:
              logger.exception("Failed to fetch case %d for guild %d", case_id, ctx.guild.id)
              await ctx.send("An error occurred while fetching the case.")
    notes:
      - Specific exception types (BotDatabaseError) rather than broad except
      - logger.exception() captures full traceback with context
      - User receives sanitized message, not internal error details

  - category: Config Access
    description: Accessing global configuration in cogs and services
    code: |
      from bot.shared.config import CONFIG

      # Direct access for required fields
      token = CONFIG.BOT_TOKEN
      db_url = CONFIG.DATABASE_URL

      # Within a cog method
      async def some_method(self) -> None:
          prefix = CONFIG.PREFIX
          # or via helper:
          prefix = self.get_config("PREFIX")
    notes:
      - CONFIG is a module-level singleton loaded at startup
      - Pydantic validation ensures all required fields present
      - get_config() helper on BaseCog for graceful None returns

  - category: Database Access
    description: CRUD operations via DatabaseCoordinator facade
    code: |
      from bot.database.models import CaseType

      async def create_warning(self, ctx: Context, member: discord.Member, reason: str) -> Case:
          """Create a warning case and notify the member."""
          case = await self.db.cases.create_case(
              guild_id=ctx.guild.id,
              user_id=member.id,
              moderator_id=ctx.author.id,
              case_type=CaseType.WARN,
              reason=reason,
          )
          logger.info(
              "Case {case_id} created: WARN for {user} by {mod}",
              case_id=case.case_id,
              user=member.id,
              mod=ctx.author.id,
          )
          return case
    notes:
      - self.db is DatabaseCoordinator (lazy-initialized on BaseCog)
      - Domain controllers accessed as attributes: self.db.cases, self.db.levels, etc.
      - All DB operations are async with proper session management

  - category: Async Gather
    description: Concurrent task execution with asyncio.gather
    code: |
      import asyncio

      async def check_permissions(self, ctx: Context) -> tuple[bool, int]:
          """Check command permissions concurrently."""
          cmd_perm_task = self.permission_system.get_command_permission(
              ctx.guild.id, ctx.command.name
          )
          user_rank_task = self.permission_system.get_user_rank(
              ctx.guild.id, ctx.author.id
          )

          cmd_perm, user_rank = await asyncio.gather(
              cmd_perm_task, user_rank_task, return_exceptions=False
          )

          return user_rank >= cmd_perm.required_rank, user_rank
    notes:
      - return_exceptions=False so first exception propagates immediately
      - return_exceptions=True used when partial results are acceptable
      - asyncio.gather replaces sequential awaits for independent tasks

  - category: Loguru Patterns
    description: Structured logging with Loguru
    code: |
      from loguru import logger

      # Leveled logging
      logger.debug("Connecting to database...")
      logger.info("Bot ready in {elapsed:.2f}s", elapsed=time.time() - start)
      logger.warning("Rate limit approaching for guild {}", guild_id)
      logger.error("Failed to load cog {name}: {error}", name=cog_name, error=exc)
      logger.exception("Unhandled exception in command {cmd}", cmd=ctx.command.name)

      # Context binding
      logger = logger.bind(guild_id=ctx.guild.id, user_id=ctx.author.id)
      logger.info("Command executed: {cmd}", cmd=ctx.command.name)
    notes:
      - "logger.exception() inside except: auto-captures traceback"
      - ".bind() creates child logger with persistent context fields"
      - "{}-style formatting with named placeholders"

  - category: Graceful Config Loading
    description: Conditional cog loading based on configuration presence
    code: |
      from bot.shared.config import CONFIG

      def unload_if_missing_config(
          condition: bool,
          config_name: str,
      ) -> bool:
          """Return True if cog should be loaded."""
          if not condition:
              logger.warning(
                  "Missing config '{name}': cog will not load",
                  name=config_name,
              )
          return condition
    usage: |
      # In setup() or cog_loader:
      if not unload_if_missing_config(
          condition=bool(CONFIG.WOLFRAM_APP_ID),
          config_name="WOLFRAM_APP_ID",
      ):
          return  # skip cog registration
    notes:
      - Prevents broken cogs from registering at startup
      - Logs clear warning about which config key is missing
      - Used for optional features (Wolfram Alpha, GitHub, etc.)
