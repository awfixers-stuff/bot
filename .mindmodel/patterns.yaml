name: Design Patterns
version: 2
description: Design patterns used in the codebase with locations, implementations, and problem solved

patterns:
  - name: Singleton
    locations:
      - src/bot/shared/config/ (CONFIG global)
      - src/bot/cache/managers.py (JailStatusCache via __new__)
    implementation: Module-level instance; __new__ override for caches
    problem_solved: Ensures single shared instance of configuration and critical caches

  - name: Facade
    location: src/bot/database/controllers/__init__.py
    class: DatabaseCoordinator
    implementation: Wraps all domain controllers (cases, levels, snippets, etc.) behind single property-based accessor
    problem_solved: Simplifies database access from cogs to await self.db.cases.<method>()

  - name: Decorator
    locations:
      - src/bot/core/decorators.py (@requires_command_permission)
    implementation: Higher-order function wrapping commands with permission checks
    problem_solved: Declarative command permission enforcement; supports allow_self_use_for_param

  - name: Strategy
    location: src/bot/cache/backend.py
    classes: InMemoryBackend, ValkeyBackend (both implement AsyncCacheBackend Protocol)
    implementation: Abstract base / Protocol defines interface; backends swap at runtime
    problem_solved: Cache backend selection (Valkey in prod, in-memory in dev)

  - name: Template Method
    locations:
      - src/bot/core/setup/base.py (BaseSetupService)
      - src/bot/core/base_cog.py (BaseCog)
    implementation: Abstract base defines skeleton; subclasses implement hooks
    problem_solved: Consistent setup flow / cog initialization with per-type variation

  - name: Mixin / Composition
    location: src/bot/database/controllers/base.py (BaseController)
    implementation: BaseController composed with CrudController, BulkOperationsController, QueryController, UpsertController, TransactionController, FilterBuilder via multiple inheritance or composition
    problem_solved: Reusable CRUD building blocks across all domain controllers

  - name: Observer
    locations: Throughout bot instance (event handlers)
    implementation: Discord.py event dispatch (on_message, on_member_join, etc.) with listener pattern
    problem_solved: Decoupled handling of Discord gateway events

  - name: Lazy Initialization
    locations:
      - BaseCog (self.db, self.cache properties)
      - Controllers (first-access initialization)
    implementation: "@property that initializes on first access"
    problem_solved: Deferred resource acquisition; avoids circular init dependencies

  - name: Protocol
    location: src/bot/cache/backend.py
    class: AsyncCacheBackend (typing.Protocol)
    implementation: Structural subtyping for cache backends
    problem_solved: Flexible backend contract without inheritance hierarchy

  - name: Exception Hierarchy
    location: src/bot/shared/exceptions/
    implementation: Root BotError -> typed subclasses (BotDatabaseError, BotPermissionDeniedError, etc.)
    problem_solved: Granular catch-and-handle vs. generic error reporting

  - name: Repository
    locations: src/bot/database/controllers/domain/ (CaseController, LevelController, SnippetController, etc.)
    implementation: Domain-specific controller wrapping session + model + CRUD mixins
    problem_solved: Abstracts SQL/ORM details behind domain-focused API

  - name: Builder
    location: src/bot/ui/embeds.py
    implementation: Fluent methods for constructing Discord embeds
    problem_solved: Clean embed construction vs. raw dict manipulation

  - name: Priority Loading
    locations:
      - src/bot/core/cog_loader.py (CogLoader)
      - src/bot/shared/constants.py (CogPriorities)
    implementation: Cogs loaded in priority order (config -> core -> mod -> fun); concurrent within priority tier
    problem_solved: Ensures config/critical cogs load before dependent feature cogs
