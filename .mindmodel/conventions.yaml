name: Coding Conventions
version: 2
description: Naming, structure, imports, error handling, async patterns, and quality conventions

naming:
  files_dirs: snake_case
  classes: PascalCase
  functions_methods: snake_case
  constants: UPPER_SNAKE_CASE with Final type annotation
  private: _leading_underscore for module-internal
  strong_private: __name_mangling for subclass-safe attributes
  cogs: XxxCog (PascalCase + Cog suffix)
  exceptions: XxxError (PascalCase + Error suffix)
  type_vars: _T, _K, _V (leading underscore)
  test_files: test_<description>.py
  test_functions: test_<short_description>
  test_classes: Test<Feature>  # rarely used, prefer function-based

imports:
  order:
    - from __future__ import annotations  # always first
    - stdlib modules
    - third-party packages
    - local application modules
    - TYPE_CHECKING block (if needed, under if TYPE_CHECKING: guard)
  style:
    - Group with single blank line between groups
    - Absolute imports preferred over relative
    - Type-only imports in TYPE_CHECKING block
  example:
    - code: |
        from __future__ import annotations

        import datetime
        import typing
        from collections.abc import Sequence

        import discord
        from sqlmodel import select

        from bot.shared.config import CONFIG
        from bot.database.models import Case

        if typing.TYPE_CHECKING:
            from bot.core.bot import Bot

docstrings:
  style: NumPy
  template: |
    Short description on one line.

    Parameters
    ----------
    param_name : type
        Description of parameter.

    Returns
    -------
    type
        Description of return value.

    Raises
    ------
    XxxError
        When something specific goes wrong.

    Examples
    --------
    >>> function_call(args)
    expected_output
  enforcement: pydoclint with NumPy style checks

error_handling:
  hierarchy:
    - "BotError (base)"
    - "BotConfigurationError: missing/invalid config"
    - "BotRuntimeError: general runtime failure"
    - "BotSetupError: startup/bootstrap failures"
    - "BotDatabaseError: DB connection/query errors"
    - "BotPermissionDeniedError: command permission denied"
    - "BotAPIError: external API call failures"
    - "BotServiceError: internal service errors"
  pattern:
    - Raise specific subclass; catch broadly in command handlers
    - Log exception context with logger.exception() before user-facing messages
    - Send user-friendly error embed via ctx.send() after logging
  anti_pattern:
    - Raising raw Exception or BaseException
    - Silencing exceptions with bare except: pass
    - Exposing internal error details to end users

async:
  - All I/O functions defined with async def
  - Concurrent calls use asyncio.gather() with return_exceptions=True
  - Database sessions use async with context manager
  - HTTP calls use async with httpx.AsyncClient
  - Long-running tasks use asyncio.create_task() with TaskMonitor tracking
  - No blocking calls (time.sleep, requests, etc.) in async code
  - Use asyncio.to_thread() for CPU-bound operations

logging:
  import: from loguru import logger
  levels: logger.debug / info / warning / error / exception
  context: logger.bind(trace_id=..., guild_id=...) for structured context
  exception: logger.exception("message") inside except blocks (auto-captures traceback)
  intercept: Loguru intercept sink captures stdlib logging from dependencies

config_access:
  import: from bot.shared.config import CONFIG
  direct: CONFIG.BOT_TOKEN, CONFIG.DATABASE_URL, etc.
  graceful: get_config("SECTION.KEY", default=...) for optional values
  validation: Pydantic BaseSettings validates on startup; missing keys raise early

decorators:
  - name: requires_command_permission
    module: bot.core.decorators
    usage: |
      @requires_command_permission()
      @requires_command_permission(allow_self_use_for_param="member")
    purpose: DB-driven permission check before command execution

cog_structure:
  pattern: |
    class XxxCog(BaseCog):
        def __init__(self, bot: Bot) -> None:
            super().__init__(bot)
            # additional init if needed

        @commands.hybrid_command(name="...", description="...")
        @requires_command_permission()
        async def xxx_command(self, ctx: Context, ...) -> None:
            """Docstring in NumPy style."""
            ...

  registration: Cogs loaded via CogLoader with priority-based ordering

file_organization:
  order:
    1. Module docstring (NumPy style)
    2. from __future__ import annotations
    3. stdlib imports (blank line after)
    4. third-party imports
    5. local imports
    6. TYPE_CHECKING block (if needed)
    7. __all__ (explicit public API)
    8. Constants (UPPER_SNAKE with Final)
    9. Class(es) (PascalCase)
    10. Functions (snake_case)

testing:
  framework: pytest with asyncio_mode=auto
  test_location: tests/<domain>/test_<feature>.py
  fixtures: tests/fixtures/<domain>_fixtures.py
  markers:
    - "@pytest.mark.asyncio"
    - "@pytest.mark.database (DB-dependent tests)"
    - "@pytest.mark.cache (cache-dependent tests)"
    - "@pytest.mark.slow (long-running)"
    - "@pytest.mark.e2e (end-to-end)"
  naming:
    - test_<what>_<condition>_<expectation>
    - Fixture names: snake_case, descriptive
  coverage: Minimum 80% line coverage enforced in CI

quality:
  linter: Ruff (line-length 88, all default rulesets)
  type_checker: basedpyright (strict mode for src/, lenient for tests/)
  docstring_checker: pydoclint (NumPy style)
  hooks: pre-commit runs ruff, basedpyright, pydoclint, yamllint
