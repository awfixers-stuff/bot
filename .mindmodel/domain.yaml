name: Domain Model
version: 2
description: Core business domain concepts, entities, events, services, value objects, and integrations

entities:
  - name: Guild
    description: Discord guild/server configuration and state
    storage: Database (SQLModel)
    key_fields: guild_id (int), settings, locale, prefix

  - name: User / Member
    description: Platform user or guild member with profile data
    storage: Database (SQLModel)
    key_fields: user_id (int), guild_id (int), display_name, joined_at

  - name: Case
    description: Moderation action record with full audit trail
    storage: Database (SQLModel)
    types:
      - BAN: Permanent guild ban
      - KICK: Member removal
      - WARN: Written warning
      - JAIL: Temporary restricted role
      - TIMEOUT: Discord timeout
      - SNIPPETBAN: Snippet creation ban
      - UNBAN: Ban reversal
      - UNMUTE: Timeout removal
      - UNJAIL: Jail release
      - MUTE: Voice/text mute (legacy)
    key_fields: case_id (int), guild_id (int), user_id (int), moderator_id (int), case_type (CaseType), reason (str), created_at (datetime)

  - name: AFK
    description: Away-from-keyboard status with optional enforcement
    storage: Database (SQLModel)
    variants:
      - enforced: Force-named user until return
      - permanent: Persistent AFK status
      - scheduled: AFK with auto-return timer
    key_fields: user_id (int), guild_id (int), message (str), afk_type, expires_at (datetime | None)

  - name: Levels (XP)
    description: Guild experience/leveling system
    storage: Database (SQLModel)
    key_fields: user_id, guild_id, xp (int), level (int), last_message_at (datetime)

  - name: Snippet
    description: Custom command/response stored per guild
    storage: Database (SQLModel)
    key_fields: name (str), guild_id (int), content (str), aliases, created_by, uses (int)

  - name: Reminder
    description: Scheduled notification delivery
    storage: Database (SQLModel)
    key_fields: reminder_id, user_id, channel_id, message, remind_at (datetime), repeat_interval

  - name: Starboard
    description: Message highlighting system
    storage: Database (SQLModel)
    key_fields: message_id, channel_id, guild_id, star_count, starred_by (set)

  - name: PermissionRank
    description: Named rank with numeric level (0-10)
    storage: Database (SQLModel)
    key_fields: rank_id, guild_id, name, level (int 0-10)
    default_levels: 0=none, 1=trusted, 2=helper, 3=mod, 4=admin, 5=custom_1, ..., 10=owner

  - name: PermissionAssignment
    description: Maps roles/users to permission ranks
    storage: Database (SQLModel)
    key_fields: guild_id, role_id (or user_id), rank_id

  - name: PermissionCommand
    description: Per-command permission overrides
    storage: Database (SQLModel)
    key_fields: guild_id, command_name, required_rank, enabled

events:
  - name: ModerationAction
    description: Fired when a moderation case is created/updated
    fields: case, action_type, moderator, reason, timestamp

  - name: MessageReceived
    description: Processed message event for XP, filters, and snippet matching
    fields: message, guild, author, content, timestamp

  - name: BotStartup
    description: Bot initialization sequence start
    fields: start_time, shard_count, guild_count

  - name: BotShutdown
    description: Graceful shutdown sequence
    fields: uptime, reason, scheduled

  - name: StarboardTriggered
    description: Message reached star threshold
    fields: message, channel, star_count, starboard_channel

  - name: ReminderFired
    description: Scheduled reminder delivery
    fields: reminder, user, channel

  - name: PermissionChanged
    description: Permission rank or assignment modified
    fields: guild_id, rank, target, action, modifier

services:
  - name: BotApp
    path: src/bot/core/app.py
    responsibility: Application lifecycle (startup, shutdown, signal handling)

  - name: Bot
    path: src/bot/core/bot.py
    responsibility: Extends commands.Bot; owns cog loading, event dispatch, state
    extends: discord.ext.commands.Bot

  - name: BaseCog
    path: src/bot/core/base_cog.py
    responsibility: Foundation class for all cogs; provides db, cache, config helpers
    pattern: "class XxxCog(BaseCog): super().__init__(bot)"

  - name: CogLoader
    path: src/bot/core/cog_loader.py
    responsibility: Priority-based concurrent cog loading with dependency ordering

  - name: PermissionSystem
    path: src/bot/core/permission_system.py
    responsibility: DB-driven rank-based command permission evaluation

  - name: DatabaseService
    path: src/bot/database/service.py
    responsibility: Async SQLAlchemy engine and session management

  - name: DatabaseCoordinator
    path: src/bot/database/controllers/__init__.py
    responsibility: Facade over domain controllers for simplified access

  - name: CacheService
    path: src/bot/cache/service.py
    responsibility: Valkey-backed caching with in-memory fallback

  - name: ModerationCoordinator
    path: src/bot/services/moderation/
    responsibility: Orchestrates case creation, notification, and audit logging

  - name: HelpSystem
    path: src/bot/help/
    responsibility: Dynamic, configurable help command system

  - name: PrefixManager
    path: src/bot/core/prefix_manager.py
    responsibility: Guild-specific prefix handling

  - name: TaskMonitor
    path: src/bot/core/task_monitor.py
    responsibility: Tracks and manages background async tasks

  - name: EmojiManager
    path: src/bot/services/emoji_manager.py
    responsibility: Emoji/custom-emoji lookup and management

  - name: BotSetupOrchestrator
    path: src/bot/core/setup/
    responsibility: Multi-phase startup orchestration (DB, cache, cogs, services)

value_objects:
  - name: CaseType
    type: StrEnum
    values: BAN, KICK, WARN, JAIL, TIMEOUT, SNIPPETBAN, UNBAN, UNMUTE, UNJAIL, MUTE

  - name: PermissionType
    type: Enum
    description: Type of permission target (role or user)

  - name: DefaultRanks
    type: IntEnum (0-7)
    description: Built-in permission rank levels

  - name: CogPriorities
    type: IntEnum
    description: Load ordering constants for cog categories

  - name: EmbedColors
    type: IntEnum
    description: Named hex color constants for Discord embeds

  - name: BotError
    type: Base Exception
    hierarchy: BotError -> BotConfigurationError, BotRuntimeError, BotSetupError, BotDatabaseError, BotPermissionDeniedError, BotAPIError, BotServiceError

integrations:
  - name: Sentry
    purpose: Error tracking and performance monitoring
    library: sentry-sdk

  - name: GitHub API
    purpose: Repository operations, issue/PR tracking
    library: githubkit

  - name: Mailcow API
    purpose: Email management (mailcow admin API)

  - name: Wolfram Alpha
    purpose: Computational knowledge queries

  - name: Godbolt / Compiler Explorer
    purpose: Code compilation visualization

  - name: Wandbox
    purpose: Multi-language code execution

  - name: Wikipedia / Arch Wiki
    purpose: Knowledge lookup commands
