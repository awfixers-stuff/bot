name: Codebase Clusters
version: 2
description: 14 logical codebase clusters with paths, files, and responsibility mapping

clusters:
  - id: core
    name: Core Framework
    path: src/bot/core/
    files:
      - app.py
      - bot.py
      - base_cog.py
      - cog_loader.py
      - logging.py
      - permission_system.py
      - prefix_manager.py
      - decorators.py
      - converters.py
      - context.py
      - task_monitor.py
      - checks.py
      - flags.py
      - types.py
      - http_config.py
      - setup/ (orchestrator + phase files)
    responsibility: Application bootstrap, lifecycle management, cog registry, permission evaluation, command context

  - id: database
    name: Database Layer
    path: src/bot/database/
    files:
      - service.py
      - utils.py
      - gather_results.py
      - models/base.py
      - models/enums.py
      - models/models.py
      - controllers/base.py
      - controllers/crud.py
      - controllers/query.py
      - controllers/bulk.py
      - controllers/upsert.py
      - controllers/transaction.py
      - controllers/filters.py
      - controllers/domain/afk.py
      - controllers/domain/case.py
      - controllers/domain/levels.py
      - controllers/domain/permissions.py
      - controllers/domain/reminder.py
      - controllers/domain/snippet.py
      - controllers/domain/starboard.py
      - migrations/ (Alembic version files)
      - controllers/__init__.py (DatabaseCoordinator facade)
    responsibility: ORM definitions, async CRUD operations, schema migrations, coordinator facade

  - id: cache
    name: Cache Layer
    path: src/bot/cache/
    files:
      - service.py
      - backend.py
      - managers.py
      - ttl.py
    responsibility: Valkey/in-memory caching with strategy pattern backends

  - id: modules
    name: Modules / Cogs
    path: src/bot/modules/
    subdirs:
      - admin/ (admin commands)
      - config/ (guild configuration)
      - features/ (feature toggles)
      - fun/ (entertainment commands)
      - guild/ (guild info/management)
      - info/ (information commands)
      - levels/ (XP/leveling)
      - moderation/ (case management)
      - snippets/ (custom commands)
      - tools/ (utility tools)
      - utility/ (general utility)
    responsibility: Discord command implementations organized by domain

  - id: services
    name: Services
    path: src/bot/services/
    files:
      - handlers/
      - sentry/
      - hot_reload/
      - moderation/
      - wrappers/
      - emoji_manager.py
      - http_client.py
    responsibility: Infrastructure services, external integrations, background processing

  - id: shared
    name: Shared / Cross-Cutting
    path: src/bot/shared/
    files:
      - config/ (Pydantic settings models)
      - exceptions/ (BotError hierarchy)
      - constants.py
      - functions.py
      - regex.py
      - version.py
      - asyncio_gather.py
    responsibility: Shared config, exception classes, constants, utility functions

  - id: ui
    name: UI Components
    path: src/bot/ui/
    files:
      - embeds.py
      - buttons.py
      - banner.py
      - views/config/ (configuration views)
      - modals/ (Discord modal forms)
    responsibility: Discord embed builders, button views, modals, banner generation

  - id: help
    name: Help System
    path: src/bot/help/
    files:
      - help.py
      - components.py
      - data.py
      - navigation.py
      - renderer.py
      - utils.py
    responsibility: Dynamic per-guild help command with category navigation

  - id: plugins
    name: Plugins
    path: src/bot/plugins/
    subdirs:
      - atl/ (AWFixer Tools & Libraries plugin)
      - v0_1_db_migrate/ (legacy migration tooling)
    responsibility: User-extensible plugin modules outside core cog system

  - id: tests
    name: Tests
    path: tests/
    subdirs:
      - core/
      - database/
      - cache/
      - modules/
      - services/
      - shared/
      - plugins/
      - performance/
      - help/
      - e2e/
      - fixtures/ (shared test fixtures)
    responsibility: Comprehensive pytest suite with domain-based organization

  - id: scripts
    name: CLI Scripts
    path: scripts/
    files:
      - core.py
      - bot/
      - db/
      - dev/
      - test/
      - config/
      - docs/
      - ai/
    responsibility: Typer CLI entry points for development, testing, DB ops, and AI validation

  - id: cursor_rules
    name: Cursor Rules
    path: .cursor/rules/
    files:
      - core/
      - database/
      - modules/
      - testing/
      - docs/
      - security/
      - error-handling/
      - ui/
      - meta/
    responsibility: AI-assisted development guardrails and conventions

  - id: cursor_commands
    name: Cursor Commands
    path: .cursor/commands/
    files:
      - code-quality/
      - testing/
      - database/
      - discord/
      - security/
      - debugging/
      - error-handling/
      - documentation/
      - development/
      - meta/
    responsibility: AI workflow automation commands

  - id: entry_point
    name: Entry Point
    path: src/bot/
    files:
      - main.py
    responsibility: Application entry point; imports and launches BotApp
