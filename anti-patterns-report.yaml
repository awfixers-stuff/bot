## Critical Issues
issues_critical:

  # C-1: Silent swallowing of all exceptions via suppress(Exception)
  - issue: contextlib.suppress(Exception) silently hides all errors
    file: src/bot/database/controllers/levels.py
    line_or_location: 216
    severity: high
    description: >
      Uses `contextlib.suppress(Exception)` when creating level entry after update.
      If the create fails (DB constraint failure, connection error, write conflict),
      the failure is completely invisible — no log, no metric, no alert.
    suggestion: >
      Replace with specific exception type (e.g., `IntegrityError`) and log the failure.
      At minimum: `try: await self.create(...) except Exception: logger.warning("...")`.

  - issue: contextlib.suppress(Exception) silently hides all errors
    file: src/bot/modules/features/starboard.py
    line_or_location: 607
    severity: high
    description: >
      Silently swallows all exceptions when removing the author's own reaction.
      If the reaction removal fails due to permissions, rate limits, or network,
      it's completely invisible.
    suggestion: >
      Narrow to `discord.Forbidden | discord.HTTPException` and log at debug level.

  - issue: contextlib.suppress(Exception) silently hides all errors
    file: src/bot/services/handlers/error/extractors.py
    line_or_location: 45, 166, 219, 309, 397, 460
    severity: high
    description: >
      Six instances in the error extraction pipeline use suppress(Exception) around
      extraction logic. While error formatters should be resilient, suppressing ALL
      exceptions means bugs in the extractors themselves go undetected.
    suggestion: >
      Narrow to expected exceptions per extractor (KeyError, ValueError, TypeError,
      AttributeError). Log unexpected failures separately.

  - issue: contextlib.suppress(Exception) silently hides all errors
    file: src/bot/services/handlers/error/formatter.py
    line_or_location: 98
    severity: high
    description: >
      Suppresses all exceptions during error detail extraction. If the detail
      extractor itself has a bug, user sees a generic error with zero diagnostic info.
    suggestion: >
      Log the suppressed exception at least. Wrap in try/except with logger.exception.

  - issue: contextlib.suppress(Exception) silently hides all errors
    file: src/bot/services/handlers/activity.py
    line_or_location: 122
    severity: high
    description: >
      Silently suppresses all exceptions during activity update. If the activity
      update fails, the bot silently stops rotating activities without any indication.
    suggestion: >
      Catch specific discord errors (`discord.HTTPException`) and log failures.

  - issue: contextlib.suppress(Exception) silently hides all errors
