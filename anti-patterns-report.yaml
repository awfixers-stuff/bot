  # C-2: Sync HTTP calls blocking the event loop
  - issue: Synchronous httpx.get() blocking event loop in async context
    file: src/bot/services/wrappers/xkcd.py
    line_or_location: 321
    severity: high
    description: >
      `_request_comic()` uses synchronous `httpx.get(comic_url)` inside a method
      called from async command handlers. The entire HTTP request blocks the
      event loop, freezing the bot for the duration of the request.
    suggestion: >
      Convert to `httpx.AsyncClient` within the wrapper, or use the shared
      `http_client` singleton. The error handling (BotAPI* exceptions) can remain.

  - issue: Synchronous httpx.get() blocking event loop in async context
    file: src/bot/services/wrappers/xkcd.py
    line_or_location: 374
    severity: high
    description: >
      Same issue as line 321 — `_request_raw_image()` uses synchronous
      `httpx.get(raw_image_url)` blocking the event loop for image downloads.
    suggestion: >
      Same fix: convert to async HTTP client or use shared http_client.

  - issue: Synchronous urllib.request.urlopen() blocking event loop
    file: src/bot/services/wrappers/tldr.py
    line_or_location: 332, 710
    severity: high
    description: >
      `fetch_tldr_page()` and archive download use `urllib.request.urlopen()`
      which is fully synchronous and blocking. Called from async command handlers
      without `asyncio.to_thread()`.
    suggestion: >
      Convert to `httpx.AsyncClient` via the shared `http_client`, or wrap
      these calls in `asyncio.to_thread()`.

  - issue: Synchronous subprocess.run() in async activity loop
    file: src/bot/services/handlers/activity.py
    line_or_location: 137, 202
    severity: high
    description: >
      `_substitute_placeholders()` calls `get_version()` which calls
      `subprocess.run(["git", "describe", ...])` on every activity rotation.
      This blocks the event loop for the entire subprocess duration.
    suggestion: >
      Cache the git version at import time, or use
      `asyncio.create_subprocess_exec()` instead of `subprocess.run()`.

  # C-3: Fire-and-forget tasks with no error handling
  - issue: asyncio.create_task without error handling (fire-and-forget)
    file: src/bot/core/prefix_manager.py
    line_or_location: 137
    severity: high
    description: >
      Creates a fire-and-forget task for `_persist_prefix` with `# noqa: RUF006`
      to suppress the linter warning. If the task raises, the exception becomes
      an unhandled task exception and is logged to stderr but never caught.
    suggestion: >
      Add a wrapper that catches exceptions: `_safe_task = lambda: try/except`
      or use `task.add_done_callback()`.

  - issue: asyncio.create_task without error handling (fire-and-forget)
    file: src/bot/modules/moderation/jail.py
    line_or_location: 115-117
    severity: high
    description: >
      Same pattern — fire-and-forget task with suppressed linter warning.
      Background rejail cleanup failures are invisible.
    suggestion: >
      Same fix: wrap with exception handler.

  - issue: asyncio.create_task inside call_later lambda without error handling
    file: src/bot/modules/utility/remindme.py
    line_or_location: 157, 224
    severity: high
    description: >
      `asyncio.create_task(self.send_reminder(r))` is created from
      `loop.call_later` lambda. If `send_reminder` raises, exception becomes
      unhandled and task reference may be GC'd.
    suggestion: >
      Use a wrapper that catches exceptions, or store task reference in a set.

  # C-4: Predictable password generation
  - issue: Predictable password generation with hardcoded prefix
    file: src/bot/plugins/atl/mail.py
    line_or_location: 121-122
    severity: high
    description: >
      Password generation uses `"changeme"` prefix with only 6 random digits
      + 4 special characters (20 chars total but 10 are static). This gives
      only ~10 characters of entropy (~66 bits at best, far less in practice).
    suggestion: >
      Use `secrets.token_urlsafe(32)` for full cryptographic randomness.

  # C-5: Raw HTTP clients instead of shared http_client
  - issue: Uses raw aiohttp.ClientSession instead of shared http_client singleton
    file: src/bot/modules/features/bookmarks.py
    line_or_location: 46
    severity: high
    description: >
      Creates its own `aiohttp.ClientSession()` in __init__ and closes it in
      cog_unload. Bypasses the shared http_client which has connection pooling,
      timeouts, HTTP/2, and centralized error handling.
    suggestion: >
      Replace with the shared `http_client` singleton from
      `bot.services.http_client`.

  - issue: Creates new aiohttp.ClientSession per command invocation
    file: src/bot/modules/tools/wolfram.py
    line_or_location: 62
    severity: high
    description: >
      Creates a brand new `aiohttp.ClientSession()` on every single command
      invocation (wasteful) and uses `except Exception:` to swallow all HTTP
      errors (line 67).
    suggestion: >
      Use the shared `http_client` singleton which reuses connections and
      has proper timeout/error handling.

  # C-6: No error handling in http_client methods
  - issue: HTTP client methods lack any error handling around raise_for_status
    file: src/bot/services/http_client.py
    line_or_location: 196-197, 223-224, 243-244, 263-264, 291-292
    severity: high
    description: >
      Every method (get, post, put, delete, request) calls
      `response.raise_for_status()` without any surrounding try/except.
      Raw httpx.HTTPStatusError and httpx.RequestError propagate to callers,
      meaning every caller must reimplement error handling.
    suggestion: >
      Add centralized error handling in http_client that converts httpx
      exceptions to BotAPI* exceptions and logs consistently.

