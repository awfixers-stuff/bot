---
name: Auto-Docs
on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.py'
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.py'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview mode — do not create PR'
        type: boolean
        default: false
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
env:
  PYTHON_VERSION: '3.13'
jobs:
  check:
    name: Check Docs Staleness
    if: github.repository == 'awfixers-stuff/bot' && github.event_name == 'pull_request'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check docs are up to date
        run: |
          python .github/scripts/autodocs.py --check

  generate:
    name: Generate API Docs
    if: github.repository == 'awfixers-stuff/bot' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    outputs:
      changed: ${{ steps.gen.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate API documentation
        id: gen
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}" = "true" ]; then
            python .github/scripts/autodocs.py --dry-run
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python .github/scripts/autodocs.py

          # Check if any .mdx files changed
          CHANGED=$(git diff --name-only || true)
          if echo "$CHANGED" | grep -q '\.mdx$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.gen.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs(api): auto-generate API reference from source'
          title: 'docs(api): auto-generate API reference from source'
          body: |
            ## Auto-Generated API Documentation

            This PR updates the auto-generated API reference docs to match current source code.

            Regenerated by `.github/scripts/autodocs.py`.
          branch: docs/auto-api-reference
          base: main
          delete-branch: true
          labels: docs, automated
