---
name: Tests
on:
  push:
    branches: [main, 'v[0-9]+.[0-9]+.[0-9]+*']
    paths-ignore:
      - '**.md'
      - docs/**
      - assets/**
      - .github/workflows/**
  pull_request:
    branches: [main, 'v[0-9]+.[0-9]+.[0-9]+*']
    paths-ignore:
      - '**.md'
      - docs/**
      - assets/**
      - .github/workflows/**
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
env:
  # renovate: datasource=python-version depName=python
  PYTHON_VERSION: 3.13.11
  ARTIFACT_RETENTION_DAYS: 7
jobs:
  changes:
    name: File Detection
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'awfixers-stuff/bot'
    permissions:
      contents: read
    outputs:
      python: ${{ steps.python_changes.outputs.any_changed }}
      tests: ${{ steps.test_changes.outputs.any_changed }}
      # Only run tests when Python source code changes (not test files or workflow files)
      any: ${{ steps.python_changes.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Check Python
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62  # v47
        id: python_changes
        with:
          files: |
            **/*.py
            pyproject.toml
            uv.lock
          files_ignore: |
            tests/**/*.py
            **/tests/**/*.py
            **/migrations/**/*.py
            src/tux/database/migrations/**/*.py
      - name: Check Tests
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62  # v47
        id: test_changes
        with:
          files: |
            tests/**
            conftest.py
  test:
    name: Run All Tests
    runs-on: blacksmith-8vcpu-ubuntu-2204
    timeout-minutes: 60
    needs: [changes]
    if: github.repository == 'awfixers-stuff/bot' && (needs.changes.outputs.any || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      pull-requests: write
      # Required for Codecov OIDC authentication
      # Allows the action to authenticate with Codecov using OpenID Connect
      # instead of requiring a CODECOV_TOKEN secret
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: ./.github/actions/setup-python
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Create Test Environment
        uses: ./.github/actions/create-test-env
        with:
          additional-vars: |
            BOT_TOKEN=test_token_for_ci
            DEBUG=True
      - name: Install Coverage Tools
        run: |
          uv sync --group docs --group test --no-dev

      # ======================================================================
      # Run tests by category with separate coverage databases
      # ======================================================================
      # Each test type uses its own COVERAGE_FILE to avoid interference.
      # This allows uploading per-flag coverage to Codecov for granular
      # coverage tracking by test category (unit, integration, e2e).
      #
      # The per-type runs generate separate XML reports that are uploaded
      # with their respective Codecov flags. A combined coverage report is
      # generated from all per-type databases for the overall project metric.

      # ----------------------------------------------------------------------
      # Unit Tests
      # ----------------------------------------------------------------------
      - name: Run Unit Tests
        id: run_unit_tests
        continue-on-error: true
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          echo "Running unit tests with separate coverage database..."
          COVERAGE_FILE=.coverage.unit uv run pytest \
            -m "unit" \
            --cov=src/bot \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            tests/ \
            2>&1 | tail -50 || true
          echo "Unit tests complete. Checking coverage-unit.xml..."
          ls -la coverage-unit.xml 2>&1 || echo "coverage-unit.xml not found"

      # ----------------------------------------------------------------------
      # Integration Tests
      # ----------------------------------------------------------------------
      - name: Run Integration Tests
        id: run_integration_tests
        continue-on-error: true
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          echo "Running integration tests with separate coverage database..."
          COVERAGE_FILE=.coverage.int uv run pytest \
            -m "integration" \
            --cov=src/bot \
            --cov-report=term-missing \
            --cov-report=xml:coverage-int.xml \
            tests/ \
            2>&1 | tail -50 || true
          echo "Integration tests complete. Checking coverage-int.xml..."
          ls -la coverage-int.xml 2>&1 || echo "coverage-int.xml not found"

      # ----------------------------------------------------------------------
      # E2E Tests
      # ----------------------------------------------------------------------
      - name: Run E2E Tests
        id: run_e2e_tests
        continue-on-error: true
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          echo "Running e2e tests with separate coverage database..."
          COVERAGE_FILE=.coverage.e2e uv run pytest \
            -m "e2e" \
            --cov=src/bot \
            --cov-report=term-missing \
            --cov-report=xml:coverage-e2e.xml \
            tests/ \
            2>&1 | tail -50 || true
          echo "E2E tests complete. Checking coverage-e2e.xml..."
          ls -la coverage-e2e.xml 2>&1 || echo "coverage-e2e.xml not found"

      # ----------------------------------------------------------------------
      # Combined JUnit Run (all tests, no coverage overhead)
      # ----------------------------------------------------------------------
      # Runs all tests with JUnit output for Codecov Test Analytics.
      # Uses --no-cov to skip coverage collection (already captured above).
      # The JUnit XML is uploaded for failed test reporting in PR comments.
      - name: Run Tests for JUnit Output
        id: run_junit
        continue-on-error: true
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          echo "Running all tests for JUnit output (no coverage)..."
          uv run pytest \
            --junitxml=junit.xml \
            -o junit_family=legacy \
            --no-cov \
            tests/ \
            2>&1 | tail -50 || true
          echo "JUnit run complete. Checking junit.xml..."
          ls -la junit.xml 2>&1 || echo "junit.xml not found"

      # ----------------------------------------------------------------------
      # Generate Combined Coverage Report
      # ----------------------------------------------------------------------
      # Combine the per-type coverage databases into a single report for the
      # overall project coverage metric. coverage combine automatically finds
      # all .coverage* files in the current directory.
      - name: Generate Combined Coverage
        id: combine_coverage
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          echo "Combining coverage databases..."
          uv run coverage combine
          echo "Generating combined coverage XML..."
          uv run coverage xml -o coverage.xml
          echo "Checking coverage.xml..."
          ls -la coverage.xml 2>&1 || echo "coverage.xml not found"
          echo "Coverage summary:"
          uv run coverage report --skip-empty --skip-covered 2>&1 | tail -30 || true

      # ======================================================================
      # Upload Coverage to Codecov with Flags
      # ======================================================================
      # Each test category uploads its own coverage report tagged with the
      # appropriate flag. This enables per-type coverage filtering in the
      # Codecov UI. Combined coverage is uploaded separately for the overall
      # project metric.
      #
      # OIDC authentication is used instead of a CODECOV_TOKEN secret.
      # Steps will fail gracefully due to fail_ci_if_error: false.

      - name: Upload Coverage (Unit)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          files: coverage-unit.xml
          flags: unit
          name: unit-tests
          fail_ci_if_error: false
          verbose: true
          use_oidc: true

      - name: Upload Coverage (Integration)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          files: coverage-int.xml
          flags: integration
          name: integration-tests
          fail_ci_if_error: false
          verbose: true
          use_oidc: true

      - name: Upload Coverage (E2E)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          files: coverage-e2e.xml
          flags: e2e
          name: e2e-tests
          fail_ci_if_error: false
          verbose: true
          use_oidc: true

      - name: Upload Coverage (Combined)
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          files: coverage.xml
          flags: combined
          name: combined-coverage
          fail_ci_if_error: false
          verbose: true
          use_oidc: true

      # ======================================================================
      # Upload Test Results for Codecov Test Analytics
      # ======================================================================
      # Provides insights into test run times, failure rates, and flaky tests.
      # Failed test reporting shows stack traces directly in PR comments.
      # Uses flags to associate test results with the appropriate test category.
      #
      # Test Analytics features:
      # - Overview of test run times and failure rates
      # - List of failed tests in PR comments with stack traces
      # - Identification of flaky tests that failed on your PR
      - name: Upload Test Results to Codecov
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          files: junit.xml
          flags: combined
          report_type: test_results
          name: test-analytics
          fail_ci_if_error: false
          verbose: true
          use_oidc: true

      # Optimize cache for CI: Remove pre-built wheels, keep source-built wheels
      # This improves cache efficiency by only keeping wheels that take time to build
      # Docs: https://docs.astral.sh/uv/concepts/cache/#caching-in-continuous-integration
      - name: Prune uv cache for CI
        if: always()
        run: uv cache prune --ci
