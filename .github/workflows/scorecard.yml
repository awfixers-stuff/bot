---
# This workflow uses actions that are not certified by GitHub. They are provided
# by a third-party and are governed by separate terms of service, privacy
# policy, and support documentation.
name: OpenSSF Scorecard
on:
  # For Branch-Protection check. Only the default branch should be checked out.
  branch_protection_rule:
  schedule:
    - cron: 30 5 * * 1  # Every Monday at 05:30 UTC
  push:
    branches: [main]
  workflow_dispatch:

# Declare default permissions as read-only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    if: github.repository == 'awfixers-stuff/bot'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      # Needed to upload the results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write
      # Needed to use the OIDC token authentication for the results.
      actions: read
      # Needed to read the repo contents for analysis.
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run Analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b757266b50c  # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Scorecard team runs a weekly scan of public repositories and publishes
          # results at https://deps.dev/. Use publish_results to share results with
          # the Scorecard team and get a badge on the project README.
          publish_results: true

      # Upload the SARIF results to GitHub code-scanning dashboard
      - name: Upload to Code-Scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4
        with:
          sarif_file: results.sarif
